<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أنت غير متصل بالإنترنت | Offline</title>
  <style>
    :root {
      --bg: #121212;
      --card: #1b1b1a;
      --text: #e5e5e5;
      --muted: #a3a3a3;
      --gold: #d4a359;
      --gold-hover: #bfa353;
      --border: #2a2a29;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-h-screen: 100vh;
      height: 100vh;
      text-align: center;
    }
    .container {
      background-color: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      max-width: 440px;
      margin: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .icon-wrapper {
      background-color: rgba(212, 163, 89, 0.1);
      width: 80px;
      height: 80px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px auto;
      color: var(--gold);
    }
    h1 {
      font-size: 20px;
      margin: 0 0 10px 0;
      color: var(--gold);
    }
    p {
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
      margin: 0 0 24px 0;
      font-weight: 300;
    }
    .btn {
      background-color: var(--gold);
      color: #121212;
      border: none;
      padding: 12px 30px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: var(--gold-hover);
    }
    .divider {
      height: 1px;
      background-color: var(--border);
      margin: 20px 0;
    }
    .en-section {
      direction: ltr;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.5M5 12.5a10.94 10.94 0 0 1 5.83-2.84M8.66 3a18.77 18.77 0 0 1 12.68 4.7M5.4 5.4a18.66 18.66 0 0 0-2.72 2.3M12 20h.01"/>
      </svg>
    </div>

    <!-- Arabic content -->
    <h1>عذراً، يبدو أنك غير متصل بالشبكة</h1>
    <p>لم نتمكن من الاتصال بالخادم. يرجى التحقق من اتصالك بالإنترنت وإعادة تحميل الصفحة بمجرد الاتصال.</p>
    
    <button class="btn" onclick="window.location.reload()">إعادة التحميل</button>

    <div class="divider"></div>

    <!-- English content -->
    <div class="en-section">
      <h1>You are currently offline</h1>
      <p>Could not connect to the server. Please verify your network connection and reload the page when you are back online.</p>
    </div>
  </div>
</body>
</html>
